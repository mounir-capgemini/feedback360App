server:
  port: 8080

spring:
  application:
    name: feedback360

  datasource:
    url: ${DB_URL:jdbc:h2:mem:feedback360;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=USER}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  flyway:
    enabled: false

# JWT Configuration
jwt:
  secret: Feedback360SecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong2024SecureKey
  expiration: 86400000  # 24 heures en millisecondes

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
